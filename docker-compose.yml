services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oniym
      POSTGRES_USER: oniym
      POSTGRES_PASSWORD: oniym
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oniym"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ponder:
    build:
      context: ./indexer
    restart: unless-stopped
    ports:
      - "42069:42069"
    environment:
      DATABASE_URL: postgresql://oniym:oniym@postgres:5432/oniym
      REDIS_URL: redis://redis:6379
      BASE_SEPOLIA_RPC_URL: ${BASE_SEPOLIA_RPC_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
