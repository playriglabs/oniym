name: Deploy Web

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - "react/**"
      - "sdk/**"
      - ".github/workflows/web.yml"

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @oniym/sdk build

      - name: Build
        working-directory: web
        run: pnpm exec opennextjs-cloudflare build

      - name: Debug build output
        working-directory: web
        run: find .open-next -maxdepth 3 | sort

      - name: Prepare Pages deploy
        working-directory: web
        run: |
          if [ -f .open-next/worker.js ] && [ ! -f .open-next/assets/_worker.js ]; then
            cp .open-next/worker.js .open-next/assets/_worker.js
          fi

      - name: Create Pages project (if not exists)
        working-directory: web
        run: pnpm exec wrangler pages project create oniym-web --production-branch=master || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy
        working-directory: web
        run: pnpm exec wrangler pages deploy --project-name=oniym-web --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
